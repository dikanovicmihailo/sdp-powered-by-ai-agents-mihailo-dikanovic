name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "hotfix/**"
    paths:
      - "mars_rover/**"
      - "tests/**"
      - "Dockerfile"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "mars_rover/**"
      - "tests/**"
      - "Dockerfile"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/**"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Code Quality & Security Checks
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build lint stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lint
          push: false
          load: true
          tags: mars-rover:lint
          cache-from: type=gha,scope=lint
          cache-to: type=gha,mode=max,scope=lint

      - name: Run code quality checks
        run: |
          echo "::group::Code Quality Checks"
          docker run --rm mars-rover:lint
          echo "::endgroup::"

      - name: Extract security report
        if: always()
        run: |
          docker run --rm -v ${{ github.workspace }}:/output mars-rover:lint \
            sh -c "cp bandit-report.json /output/ 2>/dev/null || echo 'No security report generated'"

      - name: Upload security report
        if: always() && hashFiles('bandit-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Test Suite with Coverage
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          load: true
          tags: mars-rover:test
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

      - name: Run test suite
        run: |
          echo "::group::Test Execution"
          docker run --rm -v ${{ github.workspace }}/htmlcov:/app/htmlcov mars-rover:test
          echo "::endgroup::"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: always() && hashFiles('htmlcov/index.html') != ''
        uses: codecov/codecov-action@v4
        with:
          directory: ./htmlcov
          fail_ci_if_error: false
          verbose: true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Build Production Image
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push production image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Integration Tests (Optional - runs against built image)
  # ──────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: |
          echo "::group::Integration Test - Sample Input"
          echo -e "5 5\n1 2 N\nLMLMLMLMM\n3 3 E\nMMRMMRMRRM" | \
          docker run --rm -i ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Security Scanning
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ──────────────────────────────────────────────────────────────────────────
  # Job 6: Deployment (Placeholder for future deployment stages)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, integration, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.mars-rover.example.com

    steps:
      - name: Deploy to staging
        run: |
          echo "::notice::Deployment to staging would happen here"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Digest: ${{ needs.build.outputs.image-digest }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, integration, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://mars-rover.example.com

    steps:
      - name: Deploy to production
        run: |
          echo "::notice::Deployment to production would happen here"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Digest: ${{ needs.build.outputs.image-digest }}"
